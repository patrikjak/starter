name: starter

services:
  cli:
    image: patrikjak/php-frankenphp:8.5-cli
    container_name: "starter-cli"
    environment:
      XDEBUG_MODE: develop,debug,coverage
    volumes:
      - ".:/var/www"

  node:
    image: node:25-alpine
    container_name: "starter-node"
    working_dir: /var/www
    networks:
      - shared
    volumes:
      - "./:/var/www"

networks:
  shared:
    driver: bridge
